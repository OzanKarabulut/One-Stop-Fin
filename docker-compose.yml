services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onestopfin
      POSTGRES_PASSWORD: onestopfin
      POSTGRES_DB: onestopfin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onestopfin"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://onestopfin:onestopfin@postgres:5432/onestopfin
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  worker:
    build: .
    entrypoint: ["sh", "-c", "npx prisma migrate deploy --schema=./prisma/schema.prisma && node prisma/seed.js && echo 'Worker ready' && tail -f /dev/null"]
    environment:
      DATABASE_URL: postgresql://onestopfin:onestopfin@postgres:5432/onestopfin
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
